<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Centered Box</title>

    <style>

        body {
            margin: 0;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 300px;
            height: 150px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="box">
            Centered Box
        </div>

    </div>

</body>
</html>
