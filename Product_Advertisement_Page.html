<!DOCTYPE html>
<html>
<head>
    <title>Product Advertisement</title>

    <style>

        h1 {
            text-align: center;
        }

        .price {
            text-align: right;
            font-size: 22px;
        }

        .description {
            text-align: justify;
        }

        .button {
            text-align: center;
        }

    </style>
</head>

<body>

    <h1>Smart Watch</h1>

    <div class="price">
        ₹4,999
    </div>

    <div class="description">
        <p>
            This smart watch includes fitness tracking, heart rate monitoring,
            and smart notifications with long battery life.
        </p>
    </div>

    <div class="button">
        <button>Buy Now</button>
    </div>

</body>
</html>
