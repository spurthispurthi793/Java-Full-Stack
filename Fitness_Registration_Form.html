<!DOCTYPE html>
<html>
<head>
    <title>Fitness Registration Form</title>
</head>
<body>

    <h1>Fitness Registration Form</h1>

    <form>

        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Age:</label><br>
        <input type="number" name="age" min="16" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male" required> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>

        <label>Fitness Goal:</label><br>
        <select required>
            <option value="">Select Goal</option>
            <option>Weight Loss</option>
            <option>Muscle Gain</option>
            <option>Flexibility</option>
        </select>
        <br><br>

        <label>Preferred Workout Time:</label><br>
        <input type="time" required>
        <br><br>

        <input type="checkbox" required>
        I agree to health terms
        <br><br>

        <h2>Workout Videos</h2>

        <iframe width="400" height="250"
        src="https://www.youtube.com/embed/ml6cT4AZdqI"
        allowfullscreen>
        </iframe>

        <iframe width="400" height="250"
        src="https://www.youtube.com/embed/UItWltVZZmE"
        allowfullscreen>
        </iframe>

        <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
