<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>

    <style>

        body {
            font-family: Arial;
            margin: 40px;
        }

        .question {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
        }

    </style>
</head>

<body>

    <h1>Quiz Application</h1>

    <form id="quizForm">

        <div class="question">

            <p>1. Which language is used for web development?</p>

            <input type="radio" name="q1" value="HTML"> HTML<br>
            <input type="radio" name="q1" value="Python"> Python<br>
            <input type="radio" name="q1" value="Java"> Java

        </div>

        <div class="question">

            <p>2. Which database is NoSQL?</p>

            <input type="radio" name="q2" value="MySQL"> MySQL<br>
            <input type="radio" name="q2" value="MongoDB"> MongoDB<br>
            <input type="radio" name="q2" value="Oracle"> Oracle

        </div>

        <div class="question">

            <p>3. Which symbol is used for comments in JavaScript?</p>

            <input type="radio" name="q3" value="//"> //<br>
            <input type="radio" name="q3" value="##"> ##<br>
            <input type="radio" name="q3" value="<!-- -->"> <!-- -->

        </div>

        <button type="button" onclick="calculateScore()">
            Submit Answers
        </button>

    </form>

    <h2 id="result"></h2>

    <script>

        const answers = {
            q1: "HTML",
            q2: "MongoDB",
            q3: "//"
        };

        function calculateScore() {

            let score = 0;

            const form = document.forms["quizForm"];

            if (form["q1"].value === answers.q1) {
                score++;
            }

            if (form["q2"].value === answers.q2) {
                score++;
            }

            if (form["q3"].value === answers.q3) {
                score++;
            }

            document.getElementById("result").innerHTML =
            "Your Score: " + score + " / 3";
        }

    </script>

</body>
</html>
