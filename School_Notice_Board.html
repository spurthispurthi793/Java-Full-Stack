<!DOCTYPE html>
<html>
<head>
    <title>School Notice Board</title>

    <style>

        h1 {
            text-align: center;
        }

        .date {
            text-align: right;
        }

        .notice {
            text-align: justify;
        }

        .important {
            text-align: center;
            color: red;
            font-weight: bold;
        }

        footer {
            text-align: left;
        }

    </style>
</head>

<body>

    <h1>Oxford Public School</h1>

    <div class="date">
        Date: 08-05-2026
    </div>

    <div class="notice">
        <p>
            All students are informed that the annual sports competition
            will be conducted next week. Participants should register before Friday.
        </p>
    </div>

    <div class="important">
        Important: Carry your ID card during the event.
    </div>

    <footer>
        Principal Office
    </footer>

</body>
</html>School_Notice_Board.html
