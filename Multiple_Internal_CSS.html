<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS</title>

    <style>

        h1 {
            text-align: center;
        }

        p {
            color: green;
        }

        div {
            background-color: lightgray;
            padding: 20px;
        }

    </style>
</head>

<body>

    <h1>Internal CSS Example</h1>

    <p>
        Paragraph text in green color.
    </p>

    <div>
        This is a styled div element.
    </div>

</body>
</html>
